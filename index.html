<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guía de Matemática – 3er Grado</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero panel">
        <h1>📘 Guía de Matemática – 3er Grado</h1>
        <p class="subtitle">Restas prestando a la decena y a la centena (hasta el 1000)</p>
      </header>

      <section class="panel">
        <div class="meta-grid">
          <label>Nombre: <input type="text" placeholder="____________________________" /></label>
          <label>Fecha: <input type="text" placeholder="____________________________" /></label>
        </div>
        <p><strong>Instrucciones:</strong> Resuelve cada problema. Si necesitas, presta de la decena o de la centena.</p>
      </section>

      <section id="setupPanel" class="panel start-panel">
        <h2>Selecciona secciones</h2>
        <p>Puedes generar solo una parte o una guía completa de 100 ejercicios aleatorios.</p>

        <div class="topics">
          <label><input class="section-check" type="checkbox" value="directas" checked /> Parte 1: Restas directas</label>
          <label><input class="section-check" type="checkbox" value="prestando" checked /> Parte 2: Resta prestando</label>
          <label><input class="section-check" type="checkbox" value="problemas" checked /> Parte 3: Problemas de la vida real</label>
        </div>

        <div class="actions-row">
          <label for="totalExercises"><strong>Total de ejercicios:</strong></label>
          <input id="totalExercises" type="number" min="10" max="200" step="10" value="100" />
          <button id="generateBtn" class="btn">🧮 Generar guía</button>
          <button id="printBtn" class="btn secondary">🖨️ Imprimir</button>
        </div>

        <p id="setupMessage" class="setup-message"></p>
      </section>

      <section id="worksheetPanel" class="panel worksheet-panel">
        <h2 id="worksheetTitle">Ejercicios</h2>
        <div id="worksheetContent" class="worksheet-content"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
