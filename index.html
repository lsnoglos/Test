<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Test de Ciencias 🧠🌈</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>🌟 Super Test de Ciencias Naturales 🌟</h1>
        <p class="subtitle">100 preguntas divertidas para aprender jugando</p>
        <div class="chips">
          <span>👀 Sentidos</span>
          <span>🔬 Ciencia</span>
          <span>💡 Tecnología</span>
          <span>🧼 Cuidado personal</span>
          <span>🤝 Respeto</span>
        </div>
      </header>

      <section class="panel info">
        <p id="progressText">Pregunta 1 de 100</p>
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section id="quizCard" class="panel quiz-card">
        <h2 id="questionText">Cargando pregunta...</h2>
        <div id="options" class="options"></div>
        <p id="feedback" class="feedback"></p>
      </section>

      <section class="panel actions">
        <button id="nextBtn" class="btn" disabled>Siguiente ➡️</button>
        <button id="restartBtn" class="btn secondary">🔄 Reiniciar</button>
      </section>

      <section id="result" class="panel result hidden" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
